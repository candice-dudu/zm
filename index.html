
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> 紫微流運助手 </title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #F8FAFC; color: #1E293B; }
        
        /* 畫布與網格容器 */
        #gridCanvas {
            cursor: grab;
        }
        #gridCanvas:active {
            cursor: grabbing;
        }
        
        .ziwei-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(4, 1fr);
            gap: var(--grid-gap, 0px);
            aspect-ratio: var(--grid-ratio, 0.95);
            width: 100%;
            margin: 0 auto;
        }
        
        /* 宮位全透明設計，方便對齊底圖 */
        .palace-box {
            background: transparent;
            border: 1px dashed rgba(148, 163, 184, 0.8);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 4px;
            position: relative;
            transition: all 0.2s;
        }
        .palace-box.active-month {
            background: rgba(99, 102, 241, 0.05);
            border: 2px solid #6366F1;
        }
        .palace-box.active-day {
            box-shadow: inset 0 0 0 3px #F59E0B;
            background: rgba(245, 158, 11, 0.1);
        }
        
        /* 統一的強烈文字白邊，確保底圖太花時仍然睇得清 */
        .shadow-white-outline {
            text-shadow: 1px 1px 2px white, -1px -1px 2px white, 1px -1px 2px white, -1px 1px 2px white, 0 0 8px white, 0 0 4px white;
        }
        
        .palace-label { font-size: 0.75rem; color: #334155; font-weight: 900; position: absolute; bottom: 2px; right: 4px; }
        
        /* 置中並分行的宮位文字容器 */
        .current-func { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 20; width: 100%;
        }

        .day-marker { 
            position: absolute; top: 2px; left: 2px; 
            background: #F59E0B; color: white; font-size: 10px; 
            padding: 1px 4px; border-radius: 4px; font-weight: bold;
            box-shadow: 0 0 4px rgba(255,255,255,0.8);
        }
        
        .center-box {
            grid-column: 2 / 4;
            grid-row: 2 / 4;
            background: transparent;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 1px dashed rgba(148, 163, 184, 0.5);
            padding: 10px;
            text-align: center;
        }

        .day-btn {
            width: 32px; height: 32px; border-radius: 6px; font-size: 12px;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
            transition: all 0.2s; border: 1px solid #E2E8F0; background: white;
        }
        .day-btn.selected { background: #F59E0B; color: white; border-color: #D97706; font-weight: bold; }
    </style>
</head>
<body class="p-4">
    <!-- 頂部導航 -->
    <header class="max-w-6xl mx-auto flex justify-between items-center mb-6 bg-white p-4 rounded-2xl shadow-sm">
        <div class="flex items-center gap-3">
            <div class="w-12 h-12 bg-slate-200 rounded-full border-2 border-white shadow-sm flex items-center justify-center overflow-hidden">
                <svg viewBox="0 0 100 100" class="w-full h-full">
                    <circle cx="50" cy="50" r="45" fill="#CBD5E1"/>
                    <circle cx="35" cy="40" r="4" fill="#000"/>
                    <circle cx="65" cy="40" r="4" fill="#000"/>
                    <circle cx="72" cy="55" r="2.5" fill="#333"/>
                    <path d="M40 60 Q50 68 60 60" stroke="#000" fill="none" stroke-width="2"/>
                </svg>
            </div>
            <div>
                <h1 class="text-xl font-black text-slate-800"> 喵喵紫微流運助手 </h1>
                <p class="text-xs text-slate-500 font-bold"> 流月與流日雙行同步，底圖自動對齊版！ </p>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-6">
        
        <!-- 左側：互動排盤與底圖區 -->
        <div class="lg:col-span-7 flex flex-col gap-3">
            <div class="flex flex-col gap-3 mb-1">
                <div class="flex justify-between items-end">
                    <div class="flex flex-col">
                        <h2 class="font-black text-xl text-slate-800 leading-tight" id="yearLabel">2026 丙午年 </h2>
                        <span id="currentDateLabel" class="text-xs text-amber-600 font-bold"> 農曆正月初一 </span>
                    </div>
                    <div>
                        <input type="file" id="imageUpload" class="hidden" accept="image/*">
                        <label for="imageUpload" class="bg-indigo-600 text-white px-4 py-2 rounded-lg text-xs font-bold cursor-pointer hover:bg-indigo-700 transition shadow-sm"> 📤 上傳底圖 </label>
                    </div>
                </div>
                
                <!-- 網格與底圖全方位微調工具 -->
                <div class="grid grid-cols-2 gap-x-4 gap-y-3 bg-white p-3 rounded-lg shadow-sm border border-slate-200 text-[10px] font-bold text-slate-600">
                    <div class="flex items-center gap-2">
                        <label class="w-12 shrink-0 text-slate-400">網格比例</label>
                        <input type="range" id="ratioSlider" min="0.6" max="1.5" step="0.01" value="0.95" class="w-full accent-indigo-500">
                    </div>
                    <div class="flex items-center gap-2">
                        <label class="w-12 shrink-0 text-slate-400">網格間距</label>
                        <input type="range" id="gapSlider" min="0" max="10" step="1" value="0" class="w-full accent-indigo-500">
                    </div>
                    <div class="flex items-center gap-2">
                        <label class="w-12 shrink-0 text-slate-400">底圖縮放</label>
                        <input type="range" id="imgScaleSlider" min="0.1" max="5" step="0.01" value="1" class="w-full accent-emerald-500">
                    </div>
                    <div class="flex items-center gap-2">
                        <label class="w-12 shrink-0 text-slate-400">左右位置</label>
                        <input type="range" id="imgXSlider" min="-1500" max="1500" step="1" value="0" class="w-full accent-emerald-500">
                    </div>
                    <div class="flex items-center gap-2">
                        <label class="w-12 shrink-0 text-slate-400">上下位置</label>
                        <input type="range" id="imgYSlider" min="-1500" max="1500" step="1" value="0" class="w-full accent-emerald-500">
                    </div>
                    <div class="flex justify-end items-center">
                        <button id="resetImgBtn" class="bg-slate-100 text-slate-600 px-3 py-1.5 rounded hover:bg-slate-200 transition">↺ 重設底圖</button>
                    </div>
                </div>
            </div>

            <!-- 可拖曳縮放的畫布區 -->
            <div id="gridCanvas" class="relative bg-slate-200 border-4 border-white shadow-md rounded-xl overflow-hidden select-none w-full max-w-[600px] mx-auto">
                
                <!-- 背景圖片 -->
                <img id="panImage" class="absolute top-0 left-0 hidden pointer-events-none origin-top-left" style="transform: translate(0px, 0px) scale(1); max-width: none; max-height: none;">
                
                <!-- 提示文字 -->
                <div id="dropText" class="absolute inset-0 flex flex-col items-center justify-center text-slate-400 pointer-events-none z-0">
                    <p class="text-5xl mb-3 opacity-50">🖼️</p>
                    <p class="text-sm font-bold bg-white/90 px-4 py-2 rounded-full text-slate-600 shadow-sm"> 請上傳命盤作為底圖 </p>
                </div>

                <!-- 12宮位疊加層 -->
                <div class="ziwei-grid relative z-10 pointer-events-none" id="ziweiGrid">
                    <div class="palace-box" id="p-5"><div class="current-func"></div><div class="palace-label shadow-white-outline"> 巳 </div></div>
                    <div class="palace-box" id="p-6"><div class="current-func"></div><div class="palace-label shadow-white-outline"> 午 </div></div>
                    <div class="palace-box" id="p-7"><div class="current-func"></div><div class="palace-label shadow-white-outline"> 未 </div></div>
                    <div class="palace-box" id="p-8"><div class="current-func"></div><div class="palace-label shadow-white-outline"> 申 </div></div>
                    <div class="palace-box" id="p-4"><div class="current-func"></div><div class="palace-label shadow-white-outline"> 辰 </div></div>
                    
                    <div class="center-box shadow-white-outline">
                        <div id="displayMonthName" class="text-xl font-black text-indigo-600 drop-shadow-sm"> 正月 </div>
                        <div id="displayDayNum" class="text-4xl font-black text-amber-500 drop-shadow-sm">01</div>
                        <div class="text-[10px] text-slate-600 font-bold mt-1 bg-white/70 px-2 py-0.5 rounded-full border border-slate-200"> 流日命宮 </div>
                    </div>
                    
                    <div class="palace-box" id="p-9"><div class="current-func"></div><div class="palace-label shadow-white-outline"> 酉 </div></div>
                    <div class="palace-box" id="p-3"><div class="current-func"></div><div class="palace-label shadow-white-outline"> 卯 </div></div>
                    <div class="palace-box" id="p-10"><div class="current-func"></div><div class="palace-label shadow-white-outline"> 戌 </div></div>
                    <div class="palace-box" id="p-2"><div class="current-func"></div><div class="palace-label shadow-white-outline"> 寅 </div></div>
                    <div class="palace-box" id="p-1"><div class="current-func"></div><div class="palace-label shadow-white-outline"> 丑 </div></div>
                    <div class="palace-box" id="p-0"><div class="current-func"></div><div class="palace-label shadow-white-outline"> 子 </div></div>
                    <div class="palace-box" id="p-11"><div class="current-func"></div><div class="palace-label shadow-white-outline"> 亥 </div></div>
                </div>
            </div>
            <p class="text-[11px] text-slate-400 text-center font-bold"> 💡 提示：在盤面上使用「滑鼠滾輪縮放」及「按住拖曳」即可對齊底圖宮位 </p>
        </div>

        <!-- 右側：計算與條件選擇 -->
        <div class="lg:col-span-5 flex flex-col gap-4">
            
            <!-- 流月四化顯示區 -->
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 relative overflow-hidden">
                <div class="flex justify-between items-center mb-3 border-b border-slate-100 pb-2">
                    <div class="flex items-center gap-2">
                        <span class="w-1.5 h-4 bg-emerald-400 rounded-full"></span>
                        <h3 class="text-sm font-bold text-slate-700"> 流月關鍵四化 </h3>
                    </div>
                    <span id="monthStemDisplay" class="text-[11px] font-black text-indigo-700 bg-indigo-50 px-2 py-1 rounded border border-indigo-100"> --月 </span>
                </div>
                
                <div class="grid grid-cols-4 gap-2" id="sihuaContainer">
                    <!-- 四化由JS生成 -->
                </div>
            </div>

            <!-- 輸入區 (排盤設定) -->
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 grid grid-cols-2 gap-4">
                <div class="col-span-2 flex items-center gap-2 border-b border-slate-100 pb-2">
                    <span class="w-1.5 h-4 bg-indigo-500 rounded-full"></span>
                    <h3 class="text-sm font-bold text-slate-700"> 排盤設定 </h3>
                </div>
                
                <div class="flex flex-col">
                    <label class="text-[10px] mb-1 text-slate-500 font-bold"> 出生農曆月 </label>
                    <select id="birthMonth" class="bg-slate-50 border border-slate-200 rounded p-2 text-sm font-bold outline-indigo-500">
                        <option value="1"> 正月 </option><option value="2" selected> 二月 </option><option value="3"> 三月 </option>
                        <option value="4"> 四月 </option><option value="5"> 五月 </option><option value="6"> 六月 </option>
                        <option value="7"> 七月 </option><option value="8"> 八月 </option><option value="9"> 九月 </option>
                        <option value="10"> 十月 </option><option value="11"> 十一月 </option><option value="12"> 十二月 </option>
                    </select>
                </div>
                <div class="flex flex-col">
                    <label class="text-[10px] mb-1 text-slate-500 font-bold"> 出生農曆時 </label>
                    <select id="birthTime" class="bg-slate-50 border border-slate-200 rounded p-2 text-sm font-bold outline-indigo-500">
                        <option value="0"> 子時 </option><option value="1"> 丑時 </option><option value="2"> 寅時 </option>
                        <option value="3" selected> 卯時 </option><option value="4"> 辰時 </option><option value="5"> 巳時 </option>
                        <option value="6"> 午時 </option><option value="7"> 未時 </option><option value="8"> 申時 </option>
                        <option value="9"> 酉時 </option><option value="10"> 戌時 </option><option value="11"> 亥時 </option>
                    </select>
                </div>
                <div class="flex flex-col">
                    <label class="text-[10px] mb-1 text-slate-500 font-bold"> 查詢西元年 </label>
                    <input type="number" id="queryYear" value="2026" class="bg-slate-50 border border-slate-200 rounded p-2 text-sm font-bold outline-indigo-500">
                </div>
                <div class="flex flex-col">
                    <label class="text-[10px] mb-1 text-indigo-500 font-bold"> 目標流月 </label>
                    <select id="monthSelect" class="bg-indigo-50 text-indigo-700 border border-indigo-100 rounded p-2 text-sm font-bold outline-indigo-500">
                        <!-- JS 填入 -->
                    </select>
                </div>
                <div class="col-span-2 mt-1">
                    <button id="calcBtn" class="w-full bg-slate-800 text-white rounded-lg py-2.5 text-sm font-bold hover:bg-black transition shadow-sm"> 🔄 重新計算排盤 </button>
                </div>
            </div>

            <!-- 流日選擇器 -->
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100">
                <div class="flex items-center gap-2 border-b border-slate-100 pb-2 mb-3">
                    <span class="w-1.5 h-4 bg-amber-400 rounded-full"></span>
                    <h3 class="text-sm font-bold text-slate-700"> 選擇流日 <span class="text-[10px] text-slate-400 font-normal ml-1">(初一至三十)</span></h3>
                </div>
                <div class="grid grid-cols-10 gap-1.5" id="dayPicker">
                    <!-- JS 自動生成 -->
                </div>
            </div>

            <div class="bg-amber-50 p-4 rounded-xl border border-amber-100 flex gap-3 shadow-inner">
                <div class="text-2xl"> 🐱 </div>
                <div class="text-xs text-amber-900 leading-relaxed">
                    <b> 嘟嘟老師教室： </b><br>
                    而家格子入面分開咗兩行字：<br>
                    上面深色係「流月」嘅宮位，下面<span class="text-[#EA580C] font-bold">橙色</span>係「流日」嘅宮位！當你㩒下面揀流日嗰陣，橙色嘅字就會成個盤順時針跟住你一齊轉，一眼睇晒！
                </div>
            </div>
            
        </div>
    </main>

    <script>
        const zodiacNames = ["子", "丑", "寅", "卯", "辰", "巳", "午", "未", "申", "酉", "戌", "亥"];
        const stems = ["甲", "乙", "丙", "丁", "戊", "己", "庚", "辛", "壬", "癸"];
        const palaceOrder = ["命宮", "父母", "福德", "田宅", "官祿", "奴僕", "遷移", "疾厄", "財帛", "子女", "夫妻", "兄弟"];
        
        // 四化表 (依據大耕老師/現代常見飛星三合標準)
        const sihuaData = [
            { stem: "甲", lu: "廉貞", quan: "破軍", ke: "武曲", ji: "太陽" },
            { stem: "乙", lu: "天機", quan: "天梁", ke: "紫微", ji: "太陰" },
            { stem: "丙", lu: "天同", quan: "天機", ke: "文昌", ji: "廉貞" },
            { stem: "丁", lu: "太陰", quan: "天同", ke: "天機", ji: "巨門" },
            { stem: "戊", lu: "貪狼", quan: "太陰", ke: "右弼", ji: "天機" },
            { stem: "己", lu: "武曲", quan: "貪狼", ke: "天梁", ji: "文曲" },
            { stem: "庚", lu: "太陽", quan: "武曲", ke: "太陰", ji: "天同" },
            { stem: "辛", lu: "巨門", quan: "太陽", ke: "文曲", ji: "文昌" },
            { stem: "壬", lu: "天梁", quan: "紫微", ke: "左輔", ji: "武曲" },
            { stem: "癸", lu: "破軍", quan: "巨門", ke: "太陰", ji: "貪狼" }
        ];

        let currentDay = 1;
        let scale = 1, tx = 0, ty = 0, isDown = false, startX, startY;

        // --- 底圖拖曳與縮放邏輯 (豆圖工坊風格) ---
        const imageUpload = document.getElementById('imageUpload');
        const panImage = document.getElementById('panImage');
        const gridCanvas = document.getElementById('gridCanvas');
        const resetImgBtn = document.getElementById('resetImgBtn');

        // --- 網格微調邏輯 ---
        const ratioSlider = document.getElementById('ratioSlider');
        const gapSlider = document.getElementById('gapSlider');
        const ziweiGrid = document.getElementById('ziweiGrid');

        // --- 底圖微調推桿 ---
        const imgScaleSlider = document.getElementById('imgScaleSlider');
        const imgXSlider = document.getElementById('imgXSlider');
        const imgYSlider = document.getElementById('imgYSlider');

        ratioSlider.addEventListener('input', (e) => {
            ziweiGrid.style.setProperty('--grid-ratio', e.target.value);
        });
        gapSlider.addEventListener('input', (e) => {
            ziweiGrid.style.setProperty('--grid-gap', e.target.value + 'px');
        });

        // 綁定推桿事件控制圖片
        imgScaleSlider.addEventListener('input', (e) => { scale = parseFloat(e.target.value); updateTransform(); });
        imgXSlider.addEventListener('input', (e) => { tx = parseFloat(e.target.value); updateTransform(); });
        imgYSlider.addEventListener('input', (e) => { ty = parseFloat(e.target.value); updateTransform(); });

        imageUpload.onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                panImage.onload = () => {
                    const canvasWidth = gridCanvas.offsetWidth;
                    scale = canvasWidth / panImage.naturalWidth;
                    tx = 0; ty = 0;
                    updateTransform();
                };
                panImage.src = ev.target.result;
                panImage.classList.remove('hidden');
                document.getElementById('dropText').classList.add('hidden');
            };
            reader.readAsDataURL(file);
        };

        function updateTransform() { 
            panImage.style.transform = `translate(${tx}px, ${ty}px) scale(${scale})`; 
            imgScaleSlider.value = scale;
            imgXSlider.value = tx;
            imgYSlider.value = ty;
        }

        function resetTransform() {
            if (!panImage.src || panImage.classList.contains('hidden')) return;
            const canvasWidth = gridCanvas.offsetWidth;
            scale = canvasWidth / panImage.naturalWidth || 1;
            tx = 0; ty = 0;
            updateTransform();
        }
        resetImgBtn.onclick = resetTransform;

        // 電腦滑鼠事件
        gridCanvas.onwheel = (e) => { 
            e.preventDefault(); 
            scale *= (e.deltaY > 0 ? 0.9 : 1.1); 
            scale = Math.min(Math.max(0.1, scale), 5); 
            updateTransform(); 
        };
        gridCanvas.onmousedown = (e) => { 
            isDown = true; startX = e.clientX - tx; startY = e.clientY - ty; 
        };
        window.addEventListener('mousemove', (e) => { 
            if (!isDown) return; 
            tx = e.clientX - startX; ty = e.clientY - startY; 
            updateTransform(); 
        });
        window.addEventListener('mouseup', () => isDown = false);

        // 手機觸控事件支援
        gridCanvas.addEventListener('touchstart', (e) => {
            if(e.touches.length === 1) {
                isDown = true;
                startX = e.touches[0].clientX - tx;
                startY = e.touches[0].clientY - ty;
            }
        });
        window.addEventListener('touchmove', (e) => {
            if(!isDown || e.touches.length !== 1) return;
            e.preventDefault(); 
            tx = e.touches[0].clientX - startX;
            ty = e.touches[0].clientY - startY;
            updateTransform();
        }, {passive: false});
        window.addEventListener('touchend', () => isDown = false);


        // --- 排盤邏輯 ---
        const monthSelect = document.getElementById('monthSelect');
        const dayPicker = document.getElementById('dayPicker');
        
        // 初始化月份與日期
        for(let i=1; i<=12; i++) {
            const opt = document.createElement('option');
            opt.value = i; opt.innerText = `農曆 ${i} 月`;
            monthSelect.appendChild(opt);
        }
        for(let i=1; i<=30; i++) {
            const btn = document.createElement('div');
            btn.className = `day-btn ${i === 1 ? 'selected' : ''}`;
            btn.innerText = i;
            btn.onclick = () => {
                currentDay = i;
                updateDaySelection();
                renderPalaces(); // 每次點擊流日都會重新計算整個盤面
            };
            dayPicker.appendChild(btn);
        }

        function updateDaySelection() {
            document.querySelectorAll('.day-btn').forEach((b, idx) => {
                if (idx + 1 === currentDay) b.classList.add('selected');
                else b.classList.remove('selected');
            });
        }

        document.getElementById('calcBtn').onclick = renderPalaces;
        monthSelect.onchange = renderPalaces;

        function renderPalaces() {
            const birthMonth = parseInt(document.getElementById('birthMonth').value);
            const birthTime = parseInt(document.getElementById('birthTime').value);
            const qYear = parseInt(document.getElementById('queryYear').value);
            const selMonth = parseInt(monthSelect.value);
            
            let yearStemIdx = (qYear - 4) % 10;
            if (yearStemIdx < 0) yearStemIdx += 10;
            
            let yearZodIdx = (qYear - 4) % 12;
            if (yearZodIdx < 0) yearZodIdx += 12;

            const yearStemName = stems[yearStemIdx];
            const yearZodName = zodiacNames[yearZodIdx];

            document.getElementById('yearLabel').innerText = `${qYear} 年 (${yearStemName}${yearZodName}年)`;
            document.getElementById('displayMonthName').innerText = `${zodiacNames[selMonth-1]}月 (農${selMonth}月)`;
            document.getElementById('displayDayNum').innerText = currentDay < 10 ? '0' + currentDay : currentDay;
            document.getElementById('currentDateLabel').innerText = `農曆 ${selMonth} 月 ${currentDay} 日`;

            // 計算流月天干 (五虎遁法)
            const firstMonthStemIdx = (yearStemIdx % 5 * 2 + 2) % 10;
            const curMonthStemIdx = (firstMonthStemIdx + (selMonth - 1)) % 10;
            const curMonthZodIdx = (2 + (selMonth - 1)) % 12; 

            const monthGanzhi = `${stems[curMonthStemIdx]}${zodiacNames[curMonthZodIdx]}`;
            document.getElementById('monthStemDisplay').innerText = `流月天干：${monthGanzhi}`;

            // 更新四化 UI
            const sihua = sihuaData[curMonthStemIdx];
            document.getElementById('sihuaContainer').innerHTML = `
                <div class="flex flex-col items-center justify-center bg-emerald-50 border border-emerald-100 rounded-xl py-2 shadow-sm">
                    <span class="text-[10px] text-emerald-600 font-bold mb-1"> 化祿 </span>
                    <span class="text-[13px] font-black text-emerald-700">${sihua.lu}</span>
                </div>
                <div class="flex flex-col items-center justify-center bg-purple-50 border border-purple-100 rounded-xl py-2 shadow-sm">
                    <span class="text-[10px] text-purple-600 font-bold mb-1"> 化權 </span>
                    <span class="text-[13px] font-black text-purple-700">${sihua.quan}</span>
                </div>
                <div class="flex flex-col items-center justify-center bg-blue-50 border border-blue-100 rounded-xl py-2 shadow-sm">
                    <span class="text-[10px] text-blue-600 font-bold mb-1"> 化科 </span>
                    <span class="text-[13px] font-black text-blue-700">${sihua.ke}</span>
                </div>
                <div class="flex flex-col items-center justify-center bg-rose-50 border border-rose-100 rounded-xl py-2 shadow-sm">
                    <span class="text-[10px] text-rose-600 font-bold mb-1"> 化忌 </span>
                    <span class="text-[13px] font-black text-rose-700">${sihua.ji}</span>
                </div>
            `;

            // 1. 流年正月命宮 (流年斗君)
            let janLifeIdx = (yearZodIdx - (birthMonth - 1) + birthTime) % 12;
            if (janLifeIdx < 0) janLifeIdx += 12;
            
            // 2. 流月命宮
            let curMonthLifeIdx = (janLifeIdx + (selMonth - 1)) % 12;
            
            // 3. 流日命宮
            let curDayLifeIdx = (curMonthLifeIdx + (currentDay - 1)) % 12;

            // 清理所有 UI 狀態
            document.querySelectorAll('.palace-box').forEach(el => {
                el.classList.remove('active-month', 'active-day');
                const oldMarker = el.querySelector('.day-marker');
                if (oldMarker) oldMarker.remove();
                el.querySelector('.current-func').innerHTML = '';
            });

            // 重新標示 12 宮 (流月與流日雙行同步)
            for(let z = 0; z < 12; z++) {
                
                // 計算這格 (z) 在「流月」是甚麼宮
                let m = (curMonthLifeIdx - z) % 12;
                if (m < 0) m += 12;
                
                // 計算這格 (z) 在「流日」是甚麼宮
                let d = (curDayLifeIdx - z) % 12;
                if (d < 0) d += 12;

                let monthName = palaceOrder[m].replace("宮", "");
                let dayName = palaceOrder[d].replace("宮", "");

                const box = document.getElementById(`p-${z}`);
                if (box) {
                    // 分為兩行寫入：上月(深灰) 下日(亮橙)
                    box.querySelector('.current-func').innerHTML = `
                        <div class="text-[11px] text-slate-600 font-bold leading-tight shadow-white-outline mb-0.5">月${monthName}</div>
                        <div class="text-[15px] text-[#EA580C] font-black leading-tight shadow-white-outline">日${dayName}</div>
                    `;

                    // 標示流月命宮框
                    if (m === 0) box.classList.add('active-month');
                    
                    // 標示流日命宮框及標籤
                    if (d === 0) {
                        box.classList.add('active-day');
                        const marker = document.createElement('div');
                        marker.className = 'day-marker';
                        marker.innerText = `初${currentDay}`;
                        if (currentDay > 10) marker.innerText = `${currentDay}日`;
                        box.appendChild(marker);
                    }
                }
            }
        }

        renderPalaces();
    </script>
</body>
</html>
